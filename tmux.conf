# ╔══════════════════════════════════════════════════════════╗
# ║  tmux workspace manager config                          ║
# ╚══════════════════════════════════════════════════════════╝

# ── Prefix ───────────────────────────────────────────────
# Keep C-b as prefix (change if you prefer C-a)
set -g prefix C-b

# ── General ──────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g focus-events on
set -sg escape-time 0

# ── Mouse (full support) ────────────────────────────────
set -g mouse on

# ── Workspace sidebar keybindings ───────────────────────
# prefix + w = toggle sidebar
bind w run-shell "$HOME/.tmux/scripts/toggle-sidebar.sh"

# prefix + W = fzf session picker (needs fzf installed)
bind W display-popup -E "$HOME/.tmux/scripts/picker.sh"

# prefix + N = new workspace
bind N display-popup -E "$HOME/.tmux/scripts/new-workspace.sh"

# prefix + n/p = next/prev workspace (session)
bind n switch-client -n
bind p switch-client -p

# prefix + t = new tab (window) in current workspace
bind t new-window -c "#{pane_current_path}"

# prefix + X = kill current workspace (with confirm)
bind X confirm-before -p "Kill workspace '#S'? (y/n)" kill-session

# ── Tab (window) navigation ─────────────────────────────
# Alt+number to switch tabs (no prefix needed)
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Alt+left/right to cycle tabs
bind -n M-Left  previous-window
bind -n M-Right next-window

# ── Pane splitting ──────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind _ split-window -v -c "#{pane_current_path}"

# Smart pane switching with Alt+arrow (no prefix)
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# ── Pane resizing (prefix + arrow) ──────────────────────
bind -r Up    resize-pane -U 2
bind -r Down  resize-pane -D 2
bind -r Left  resize-pane -L 2
bind -r Right resize-pane -R 2

# ── Status bar: workspace + tabs ────────────────────────
set -g status-position bottom
set -g status-interval 2
set -g status-style "bg=#1a1b26,fg=#a9b1d6"

# Left: current workspace name
set -g status-left-length 30
set -g status-left "#[bg=#7aa2f7,fg=#1a1b26,bold]  #S #[bg=#1a1b26,fg=#7aa2f7] "

# Center: window tabs
set -g status-justify left
setw -g window-status-format "#[fg=#565f89] #I:#W "
setw -g window-status-current-format "#[bg=#292e42,fg=#7aa2f7,bold] #I:#W #[fg=#292e42]"
setw -g window-status-separator ""

# Right: pane count + session count
set -g status-right-length 60
set -g status-right "#[fg=#565f89]#{pane_current_command} #[fg=#7aa2f7]│ #[fg=#a9b1d6]#{session_windows} tabs  #[bg=#7aa2f7,fg=#1a1b26,bold] #{server_sessions} ws "

# ── Pane borders ────────────────────────────────────────
set -g pane-border-style "fg=#292e42"
set -g pane-active-border-style "fg=#7aa2f7"
set -g pane-border-lines heavy
set -g pane-border-indicators colour

# Display pane numbers longer for easier selection
set -g display-panes-time 2000

# ── Window/pane titles ──────────────────────────────────
set -g set-titles on
set -g set-titles-string "#S / #W"
setw -g automatic-rename on

# ── Copy mode (vi style) ───────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ── Popup session overview (prefix + o) ─────────────────
bind o display-popup -w 60% -h 60% -E '\
  echo "╔═══ WORKSPACE OVERVIEW ═══╗"; echo; \
  tmux list-sessions -F "#{session_name}" | while read s; do \
    attached=$(tmux display-message -t "$s" -p "#{session_attached}" 2>/dev/null); \
    [ "$attached" = "1" ] && mark="◀" || mark=" "; \
    echo "━━ $s $mark"; \
    tmux list-windows -t "$s" -F "  #{window_index}: #{window_name} (#{window_panes} panes)" 2>/dev/null; \
    echo; \
  done; \
  echo "Press ENTER to close"; read'

# ── Reload config ───────────────────────────────────────
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"
